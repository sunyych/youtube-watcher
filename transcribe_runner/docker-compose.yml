# Run this on the GPU machine. Point queue's TRANSCRIBE_RUNNER_URL to this host:port.
# Uses Dockerfile.gpu (CUDA 12) so WHISPER_DEVICE=cuda works.
services:
  transcribe_runner:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: transcribe_runner
    ports:
      - "${PORT:-8765}:8765"
    environment:
      PORT: 8765
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-large-v3}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      # All GPUs passed in; software selects which to use: GPU_NAME_FILTER=3060 uses only GPUs whose name contains "3060" (e.g. two RTX 3060s). Else set CUDA_VISIBLE_DEVICES.
      GPU_NAME_FILTER: ${GPU_NAME_FILTER:-3060}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-2}
      NUM_GPUS: ${NUM_GPUS:-2}
      AUDIO_TARGET_SAMPLE_RATE: ${AUDIO_TARGET_SAMPLE_RATE:-16000}
      VAD_THRESHOLD: ${VAD_THRESHOLD:-0.5}
      VAD_MIN_SILENCE_DURATION_MS: ${VAD_MIN_SILENCE_DURATION_MS:-2000}
      VAD_SPEECH_PAD_MS: ${VAD_SPEECH_PAD_MS:-400}
      VAD_MAX_SPEECH_DURATION_S: ${VAD_MAX_SPEECH_DURATION_S:-30}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # Pass all GPUs into container; which to use is controlled by CUDA_VISIBLE_DEVICES (e.g. 1,2 for two 3060s)
              count: all
              capabilities: [gpu]
    restart: unless-stopped
